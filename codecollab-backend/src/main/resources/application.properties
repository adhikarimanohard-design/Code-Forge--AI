spring.application.name=codecollab
server.port=8080

# MongoDB Atlas
spring.data.mongodb.uri=mongodb+srv://<user>:<pass>@cluster.mongodb.net/codecollab

# JWT
jwt.secret=your_super_secret_key_minimum_32_chars_long
jwt.expiration=86400000

# Gemini (or swap with Claude)
Gemini.api.key=sk-your-gemini-key

spring.main.allow-circular-references=true